name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTH_GOOGLE_ID: ci-google-client-id
      AUTH_GOOGLE_REDIRECT_URI: http://localhost:3000/login/google/callback
      AUTH_GOOGLE_SECRET: ci-google-client-secret
      DATABASE_URL: postgresql://postgres:password@localhost:5432/partyroombloom_ci?schema=public
      OPENAI_API_KEY: ci-openai-api-key

    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_DB: partyroombloom_ci
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d partyroombloom_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check production dependencies
        run: npm audit --omit=dev

      - name: Validate committed migrations
        run: npm run db:migrate:deploy

      - name: Verify project
        run: npm run verify

      - name: Smoke production health endpoint
        run: npm run smoke:production
